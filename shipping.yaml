- name: configure the shipping
  hosts: shipping
  become: yes
  tasks:
  - name: install maven and mysql
    ansible.builtin.dnf:
      name: "{{ item  }}"
      state: present
    loop:
    - maven
    - mysql

  - name: creating system user
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: delete the directory
    ansible.builtin.file:
      name: /app
      state: absent 

  - name: create the app directory
    ansible.builtin.file:
      name: /app
      state: directory

  - name: delete the shipping zip file
    ansible.builtin.file:
      path: /tmp/shipping.zip
      state: absent

  - name: download the shipping zip file
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
      dest: /tmp/shipping.zip

  - name: unzip the file
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app

  - name: install dependencies
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar 
    args:
      chdir: /app    

  - name: systemctl service
    ansible.builtin.template:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service

  - name: daemon reloaded
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: install dependencies
    ansible.builtin.pip:
      name: "{{ item  }}"
      executable: pip3.9
    loop:
    - PyMySQL
    - cryptography

  - name: import shipping data
    community.mysql.mysql_db:
     state: import
     name: all
     login_host: "{{ MYSQL_HOST }}"
     login_user: root
     login_password: RoboShop@1
     target: "{{ item  }}"
    loop:
    -  /app/db/schema.sql
    -  /app/db/app-user.sql 
    -  /app/db/master-data.sql

  - name: start and enable the service
    ansible.builtin.service:
      name: shipping
      state: restarted
      enabled: yes