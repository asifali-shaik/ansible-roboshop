- name: creating ec2 
  hosts: localhost
  connection: local
  vars:
    sg_id: sg-0e4cc6ef0fc01d10d
    ami_id: ami-0220d79f3f480ecf5
    domain_name: shaiks.online
    env : dev
    action: create
    instances:
    - mongodb
    - catalogue
    - redis
    - mysql
    - user
    - cart
    - shipping
    - payment
    - rabbitmq
    - frontend
  tasks:
  - name: creating ec2 instances
    amazon.aws.ec2_instances:
      instance_type : "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Env: "{{ env}}"
        Name: "{{ item }}-{{ env}}"
    loop: "{{ instances }}"
    register: ec2_output
    when: action == "create"
  

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"

  - name: creating r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
   
    loop: "{{ ec2_output.results }}"

  - name: creating r53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
        
    loop: "{{ ec2_output.results }}"
    when: 
    - item.item == "frontend"
    - action == "create"

  ### destroy ###
  - name: delete r53 records
    amazon.aws.route53:
      state: absent
      zone_id: "{{ domain_name }}"
      record: "{{ item }}-{{ env }}.{{ domain_name }}"
      type: A 
      ttl: 1
    loop: "{{ instances }}"
    when: action == "destroy"


  - name: delete the instances
    amazon.aws.ec2_instance:
      state: absent
      name: "{{ item }}-{{ env }}"
      wait: false
    loop: "{{ instances }}"
    when: action == "destroy"