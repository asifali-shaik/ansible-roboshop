- name: configure mysql
  become: yes
  hosts: mysql
  tasks:
  - name: install mysql
    ansible.builtin.dnf:
        name: mysql-server 
        state: present

  - name: start and enable mysql server
    ansible.builtin.service:
      name: mysqld
      state: restarted
      enabled: yes

  - name: set up root password
    ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1